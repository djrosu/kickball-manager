services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kickball
      POSTGRES_USER: kickball
      POSTGRES_PASSWORD: kickball
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kickball
      SPRING_DATASOURCE_USERNAME: kickball
      SPRING_DATASOURCE_PASSWORD: kickball

volumes:
  postgres-data:
