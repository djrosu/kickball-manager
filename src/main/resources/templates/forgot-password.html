<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password | Singles, Sports and Social</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page narrow">
    <h1>Singles, Sports and Social</h1>
    <p class="muted">Enter your league email address and we will send you a password reset link.</p>

    <div class="success" th:if="${message}" th:text="${message}"></div>

    <form th:action="@{/forgot-password}" method="post" class="card">
        <label for="email">Email Address</label>
        <input id="email" name="email" type="email" required autofocus placeholder="you@example.com">

        <button type="submit">Send Reset Link</button>
    </form>

    <p class="small-link">
        <a th:href="@{/login}">Back to login</a>
    </p>
</main>
</body>
</html>
