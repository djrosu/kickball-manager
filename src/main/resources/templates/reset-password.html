<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Choose New Password | Singles, Sports and Social</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page narrow">
    <h1>Singles, Sports and Social</h1>
    <p class="muted">Choose a new password for your league account.</p>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form th:if="${token}" th:action="@{/reset-password}" method="post" class="card">
        <input type="hidden" name="token" th:value="${token}">

        <label for="password">New Password</label>
        <input id="password" name="password" type="password" minlength="8" required autofocus>

        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" required>

        <button type="submit">Update Password</button>
    </form>

    <p class="small-link">
        <a th:href="@{/login}">Back to login</a>
    </p>
</main>
</body>
</html>
